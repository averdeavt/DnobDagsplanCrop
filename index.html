<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  overflow: hidden;
  background: white;
}

.wrapper {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
}

iframe {
  border: none;

  width: 1600px;
  height: 1000px;

  transform: scale(1.75) translateX(-300px);
  transform-origin: top left;
}
</style>
</head>

<body>
<div class="wrapper">
  <iframe src="https://tinyurl.com/yck8vsh5"></iframe>
</div>
</body>
</html>
